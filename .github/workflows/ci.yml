name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-latest
          - platform: Linux
            os: ubuntu-latest
          - platform: Windows
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run check:codex-protocol
      - run: npm run check:architecture
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:renderer:dom
      - run: npm run build
      - name: Build unpacked native package
        run: npm exec electron-builder -- --dir
      - name: Smoke test packaged runtime
        run: npm run verify:packaged-runtime
