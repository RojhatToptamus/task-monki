name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-latest
            command: npm run dist:mac -- --publish never
          - platform: Windows
            os: windows-latest
            command: npm run dist:win -- --publish never
          - platform: Linux
            os: ubuntu-latest
            command: npm run dist:linux -- --publish never

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run check:codex-protocol

      - run: npm run typecheck

      - run: npm test

      - name: Build unsigned artifacts
        run: ${{ matrix.command }}

      - name: Verify packaged artifacts
        run: npm run verify:release-artifacts

      - name: Smoke test packaged runtime
        run: npm run verify:packaged-runtime

      - name: Generate checksums
        if: runner.os != 'Windows'
        run: find release -maxdepth 1 -type f ! -name 'SHA256SUMS-*' -exec shasum -a 256 {} + > release/SHA256SUMS-${{ runner.os }}.txt

      - name: Generate checksums
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem release -File |
            Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content release/SHA256SUMS-Windows.txt

      - name: Upload verified artifacts and checksums
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: true
          files: |
            release/Task-Monki-*
            release/latest*.yml
            release/SHA256SUMS-${{ runner.os }}.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
