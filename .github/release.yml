changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - fix
        - bug
    - title: Packaging and Releases
      labels:
        - packaging
        - release
        - ci
    - title: Documentation
      labels:
        - documentation
    - title: Other Changes
      labels:
        - "*"
